<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Flores Amarillas 🌻</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to top, #fff7cc, #ffe066);
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 3em;
      color: #b8860b;
    }

    p {
      font-size: 1.5em;
      color: #6b4f00;
      max-width: 500px;
    }

    .flower {
      position: absolute;
      width: 50px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      background: #ffd700;
      cursor: pointer;
    }

    button:hover { background: #ffcc00; }
  </style>
</head>
<body>

  <div>
    <h1>🌻 Para Ti 🌻</h1>
    <p>
      Hoy te regalo estas flores amarillas, mi ojona 🌻💛<br><br>
      Perdóname por no poder dártelas físicamente,
      pero cada una lleva todo lo que siento por ti 💛
    </p>
    <button onclick="abrirSorpresa()">Haz clic aquí 💛</button>
  </div>

  <script>
    function crearFlor() {
      const flor = document.createElement("img");
      flor.src = "https://cdn-icons-png.flaticon.com/512/2909/2909760.png";
      flor.classList.add("flower");
      flor.style.left = Math.random() * window.innerWidth + "px";
      flor.style.animationDuration = (Math.random() * 3 + 2) + "s";
      document.body.appendChild(flor);

      setTimeout(() => flor.remove(), 5000);
    }

    setInterval(crearFlor, 300);

    function abrirSorpresa() {
      const nuevaVentana = window.open("", "_blank");

      nuevaVentana.document.write(`
        <html>
        <head>
          <title>Para Ti 💛</title>
          <style>
            body {
              margin: 0;
              height: 100vh;
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
              background: linear-gradient(to top, #fff7cc, #ffe066);
              font-family: Arial;
              text-align: center;
              overflow: hidden;
            }

            img {
              width: 250px;
              margin: 10px;
              border-radius: 15px;
              box-shadow: 0 4px 10px rgba(0,0,0,0.2);
              opacity: 0;
              transform: scale(0.5);
              animation: aparecer 1s forwards;
            }

            img:nth-child(1) { animation-delay: 0.3s; }
            img:nth-child(2) { animation-delay: 0.6s; }

            @keyframes aparecer {
              to { opacity: 1; transform: scale(1); }
            }

            h1 {
              color: #b8860b;
              font-size: 3em;
              margin-top: 20px;
              opacity: 0;
              animation: texto 2s forwards;
              animation-delay: 1.2s;
            }

            @keyframes texto {
              from { opacity: 0; transform: translateY(20px); }
              to { opacity: 1; transform: translateY(0); }
            }
          </style>
        </head>
        <body>
          <img src="ramo1.jpg">
          <img src="ramo2.jpg">
          <h1>TE AMO MUCHO MI OJONA ❤️💕</h1>
        </body>
        </html>
      `);

      nuevaVentana.document.close();
    }
  </script>

</body>
</html>
